# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$localip\
$conda\
$hostname\
$directory\
$shlvl\
$singularity\
$kubernetes\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$cmd_duration\
$hg_branch\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$env_var\
$crystal\
$custom\
$sudo\
$jobs\
$status\
$container\
$shell\
$python\
$line_break\
$username\
$os\
$character"""

command_timeout = 1000

[time]
disabled = false
format = '󱑈 [[$time]($style)]($style) '

[character]
# success_symbol = "[](green)"
# error_symbol = "[](bold red)"
vicmd_symbol = "[](bold green)"

[line_break]
disabled = false

[fill]
symbol = ' '

[conda]
symbol = " "
format = '\([$symbol$environment]($style)\) '
ignore_base = false

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
# symbol = "\ue73c "

[package]
symbol = "󰏗 "
format = '[$symbol$version]($style) '

[lua]
symbol = " "
format = '[$symbol($version )]($style)'

[rust]
symbol = " "
format = '[$symbol($version )]($style)'
# symbol = "\ue7a8 "

[directory]
read_only = " 󰌾"
format = "\uf07b [$path]($style)[$read_only]($read_only_style) "

[username]
# format = "\uf007 [$user]($style) "
format = "[$user]($style) "
disabled = false
show_always = true


[hostname]
ssh_symbol = " "
format = '[$ssh_symbol$hostname]($style) '
style = 'bold dimmed green'
ssh_only = true

[swift]
format = '[$symbol($version )]($style)'


[git_branch]
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
conflicted = "≠"
modified = "!${count}"
untracked = "?${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
stashed = "↤${count}"
staged = "+${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
renamed = "≫${count}"
deleted = "✘${count}"

[os]
disabled = false

