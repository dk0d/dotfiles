# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$os\
$username\
$directory\
$all\
$line_break\
$character"""

# format = """$os\
# $all\
# $git_branch\
# $git_commit\
# $git_state\
# $git_metrics\
# $git_status\
# $character"""

# everything else to the right
command_timeout = 2500


[shell]
fish_indicator = '≤░Ι║ '
powershell_indicator = 'ΎΣι_'
unknown_indicator = 'mystery shell'
style = 'cyan bold'
disabled = true

[time]
disabled = true
format = 'ΌΟΖ [[$time]($style)]($style) '

[character]
# success_symbol="[≤░ΧΠ](green)"
# success_symbol = "[ΎΣΕ ](blue)"
# success_symbol = "[ΎΥο ](blue)"
# error_symbol = "[ΎΥο ](bold red)"
# success_symbol = "[ΎΔπ ](blue)"
# error_symbol = "[ΎΔπ ](bold red)"
# success_symbol = "[ΎΔγ](blue)"
# error_symbol = "[ΎΔγ](red)"
# success_symbol = "[≤░α│](bold blue)"
# error_symbol = "[≤░α│](bold red)"
success_symbol = "[;](bold blue)"
# success_symbol = "[ΎΖΧ](blue)"
# error_symbol = "[;](bold red)"
# success_symbol = "[ΌΛΖ](green)"
error_symbol = "[ΎΑΞ](bold red)"
vimcmd_symbol = "[Όατ ](bold yellow)"

[line_break]
disabled = false

[fill]
symbol = " "
style = ''

[conda]
symbol = "ΎΕΝ "
format = '\([$symbol$environment]($style)\) '
ignore_base = true

[python]
symbol = "ΌΙ╡ "
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
# symbol = "\ue73c "

[package]
symbol = "≤░ΠΩ "
format = '[$symbol$version]($style) '

[lua]
symbol = "Όαι "
format = '[$symbol($version )]($style)'

[rust]
symbol = "Όηρ "
format = '[$symbol($version )]($style)'
# symbol = "\ue7a8 "

[directory]
read_only = " ≤░Ν╛"
format = "\uf07b [$path]($style)[$read_only]($read_only_style) "

[username]
# format = "\uf007 [$user]($style) "
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_symbol = "ΌυΒ "
format = '[$ssh_symbol$hostname]($style) '
style = 'bold dimmed green'
ssh_only = true

[swift]
format = '[$symbol($version )]($style)'
symbol = "ΌζΧ "

[git_branch]
symbol = "ΎΡα "
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
conflicted = "έΚι"
modified = "!${count}"
untracked = "?${count}"
ahead = "έΘκ${count}"
behind = "έΘμ${count}"
stashed = "έΗν${count}"
staged = "+${count}"
diverged = "έΘΧέΘκ${ahead_count}έΘμ${behind_count}"
renamed = "έΚτ${count}"
deleted = "έεα${count}"

[os]
disabled = true

