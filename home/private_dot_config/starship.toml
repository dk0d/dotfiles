# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$all\
$fill \
$os\
$username\
$time\
$line_break\
$character"""

command_timeout = 1000

[time]
disabled = false
format = '¯Äà [[$time]($style)]($style) '

[character]
# success_symbol = "[¯èà](green)"
# error_symbol = "[´Çı](bold red)"
vicmd_symbol = "[¯İ½](bold green)"

[line_break]
disabled = false

[fill]
symbol = "ÔÇö"
style = 'bold dimmed'

[conda]
symbol = "´äî "
format = '\([$symbol$environment]($style)\) '
ignore_base = true

[python]
symbol = "¯êÁ "
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
# symbol = "\ue73c "

[package]
symbol = "¾░Åù "
format = '[$symbol$version]($style) '

[lua]
symbol = "¯İá "
format = '[$symbol($version )]($style)'

[rust]
symbol = "¯Ş¿ "
format = '[$symbol($version )]($style)'
# symbol = "\ue7a8 "

[directory]
read_only = " ¾░î¥"
format = "\uf07b [$path]($style)[$read_only]($read_only_style) "

[username]
# format = "\uf007 [$user]($style) "
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_symbol = "¯¼ü "
format = '[$ssh_symbol$hostname]($style) '
style = 'bold dimmed green'
ssh_only = true

[swift]
format = '[$symbol($version )]($style)'


[git_branch]
symbol = "´Éİ "
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
conflicted = "Ôëá"
modified = "!${count}"
untracked = "?${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
stashed = "Ôåñ${count}"
staged = "+${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
renamed = "Ôë½${count}"
deleted = "Ô£İ${count}"

[os]
disabled = false

