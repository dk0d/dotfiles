# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# format = """\
# $os\
# $username\
# $directory\
# $all\
# $line_break\
# $character"""

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

# format = """$os\
# $all\
# $git_branch\
# $git_commit\
# $git_state\
# $git_metrics\
# $git_status\
# $character"""

# everything else to the right
command_timeout = 2500


[shell]
fish_indicator = '¾░ê║ '
powershell_indicator = '´æá_'
unknown_indicator = 'mystery shell'
style = 'cyan bold'
disabled = true

[time]
disabled = true
format = '¯Äà [[$time]($style)]($style) '

[character]
# success_symbol="[¾░òÅ](green)"
# success_symbol = "[´æä ](blue)"
# success_symbol = "[´ôĞ ](blue)"
# error_symbol = "[´ôĞ ](bold red)"
# success_symbol = "[´âğ ](blue)"
# error_symbol = "[´âğ ](bold red)"
# success_symbol = "[´âÜ](blue)"
# error_symbol = "[´âÜ](red)"
# success_symbol = "[¾░İ│](bold blue)"
# error_symbol = "[¾░İ│](bold red)"
success_symbol = "[;](bold bright-black)"
# success_symbol = "[´àò](blue)"
# error_symbol = "[;](bold red)"
# success_symbol = "[¯èà](green)"
error_symbol = "[´Çı](bold red)"
vimcmd_symbol = "[¯İ½ ](bold yellow)"

[line_break]
disabled = false

[fill]
symbol = " "
style = ''

[conda]
symbol = "´äî "
format = '\([$symbol$environment]($style)\) '
ignore_base = true

[python]
# symbol = "¯êÁ "
# format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
# # symbol = "\ue73c "
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []

[package]
symbol = "¾░Åù "
format = '[$symbol$version]($style) '

[lua]
symbol = "¯İá "
format = '[$symbol($version )]($style)'

[rust]
symbol = "¯Ş¿ "
format = '[$symbol($version )]($style)'
# symbol = "\ue7a8 "

[directory]
read_only = " ¾░î¥"
format = "\uf07b [$path]($style)[$read_only]($read_only_style) "

[username]
# format = "\uf007 [$user]($style) "
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_symbol = "¯¼ü "
format = '[$ssh_symbol$hostname]($style) '
style = 'bold dimmed green'
ssh_only = true

[swift]
format = '[$symbol($version )]($style)'
symbol = "¯Øò "

[git_branch]
symbol = "´Éİ "
# format = "[$symbol$branch(:$remote_branch)]($style) "
format = "[$branch]($style) "
style = "bright-black"

[cmd_duration]
format = " [$duration]($style) "
style = "yellow"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
conflicted = "Ôëá"
modified = "!${count}"
untracked = "?${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
stashed = "Ôåñ${count}"
staged = "+${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
renamed = "Ôë½${count}"
deleted = "Ô£İ${count}"

[os]
disabled = true

